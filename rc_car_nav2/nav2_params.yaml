# ===========================
# NAV2 MVP (ODOM-ONLY, ACKERMANN RC)
# Minimal + complete + fixes tiny-velocity stuck
# ===========================

common:
  use_sim_time: &use_sim_time false
  global_frame: &global_frame odom
  base_frame: &base_frame base_link
  odom_topic: &odom_topic /odometry/filtered
  turning_radius: &turning_r 0.40      # set to your RC min turning radius (m)
  robot_radius: &robot_r 0.20          # set correctly (m)
  costmap_res: &res 0.05

# ---------------------------
# BT Navigator
# ---------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: *use_sim_time
    global_frame: *global_frame
    robot_base_frame: *base_frame
    odom_topic: *odom_topic
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    bt_loop_duration: 10
    default_server_timeout: 20

# ---------------------------
# Costmaps (rolling in odom)
# ---------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: *use_sim_time
      global_frame: *global_frame
      robot_base_frame: *base_frame
      rolling_window: true
      width: 10.0
      height: 10.0
      resolution: *res
      robot_radius: *robot_r
      update_frequency: 10.0
      publish_frequency: 5.0
      plugins: ["voxel_layer", "inflation_layer"]
      always_send_full_costmap: true

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /zed/zed_node/point_cloud/cloud_registered
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 5.0
          raytrace_max_range: 6.0
          clearing: true
          marking: true
          data_type: "PointCloud2"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.60
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: *use_sim_time
      global_frame: *global_frame
      robot_base_frame: *base_frame
      rolling_window: true
      width: 50.0
      height: 50.0
      resolution: *res
      robot_radius: *robot_r
      update_frequency: 2.0
      publish_frequency: 2.0
      plugins: ["voxel_layer", "inflation_layer"]
      always_send_full_costmap: true

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 4.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /zed/zed_node/point_cloud/cloud_registered
          max_obstacle_height: 4.0
          min_obstacle_height: 0.1
          obstacle_max_range: 10.0
          raytrace_max_range: 12.0
          clearing: true
          marking: true
          data_type: "PointCloud2"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.60          # FIX: not 0.015
        cost_scaling_factor: 2.5

# ---------------------------
# Planner (SMAC Hybrid-A*)
# ---------------------------
planner_server:
  ros__parameters:
    use_sim_time: *use_sim_time
    planner_plugins: ["GridBased"]

    GridBased:
      # If this fails to load, change :: to /
      plugin: "nav2_smac_planner::SmacPlannerHybrid"

      tolerance: 0.25
      allow_unknown: true

      max_iterations: 1000000
      max_planning_time: 2.0

      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      minimum_turning_radius: *turning_r

      reverse_penalty: 5.0             # FIX: must be >= 1
      non_straight_penalty: 1.2
      cost_penalty: 2.0

      smooth_path: true

# ---------------------------
# Controller (MPPI Ackermann)
# ---------------------------
controller_server:
  ros__parameters:
    use_sim_time: *use_sim_time
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.20
      movement_time_allowance: 5.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      motion_model: "Ackermann"
      AckermannConstraints:
        min_turning_r: *turning_r

      time_steps: 56
      model_dt: 0.05

      batch_size: 2000
      iteration_count: 2

      vx_max: 0.25
      vx_min: -0.10
      vy_max: 0.0
      wz_max: 1.9

      ax_max: 3.0
      ax_min: -3.0
      ay_max: 0.0

      vx_std: 0.25
      vy_std: 0.0
      wz_std: 0.55

      temperature: 0.3
      gamma: 0.02

      transform_tolerance: 0.1
      visualize: false

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: true

      critics: [
        "ConstraintCritic",
        "CostCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PathAngleCritic",
        "PreferForwardCritic",
        "VelocityDeadbandCritic",
        "TwirlingCritic"
      ]

      # KEY FIX: penalize low speeds so it doesn't output ~0
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 60.0
        deadband_velocities: [0.08, 0.0, 0.10]   # <-- set vx to min speed that moves your car

      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 6.0

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 0.5

      # FIX: reduce over-aggressive alignment that can cause stopping on circles
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 10
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

# ---------------------------
# Smoother (minimal)
# ---------------------------
smoother_server:
  ros__parameters:
    use_sim_time: *use_sim_time
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 300
      do_refinement: true

# ---------------------------
# Velocity smoother (COMPLETE + fixes tiny command issue)
# ---------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: *use_sim_time

    smoothing_frequency: 20.0
    scale_velocities: false

    feedback: "OPEN_LOOP"
    odom_topic: *odom_topic
    odom_duration: 0.1
    velocity_timeout: 1.0

    max_velocity: [0.30, 0.0, 1.9]
    min_velocity: [-0.10, 0.0, -1.9]
    max_accel: [2.0, 0.0, 2.0]
    max_decel: [-2.0, 0.0, -2.0]

    # Backup guardrail: prevent tiny float commands
    deadband_velocity: [0.06, 0.0, 0.08]

