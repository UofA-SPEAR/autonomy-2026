controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.20
      movement_time_allowance: 5.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000

      ax_max: 3.0
      ax_min: -3.0
      ay_max: 0.0
      az_max: 3.5

      vx_std: 0.25     # FIX (more exploration)
      vy_std: 0.0
      wz_std: 0.55     # FIX

      vx_max: 0.25
      vx_min: -0.10    # FIX (less reverse)
      vy_max: 0.0
      wz_max: 1.9

      iteration_count: 2  # FIX (more robust than 1)

      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.02        # FIX (slightly higher helps avoid freezing)

      motion_model: "Ackermann"
      visualize: false
      reset_period: 1.0
      regenerate_noises: false

      AckermannConstraints:
        min_turning_r: 0.4

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: true     # FIX (was false in your working config)

      critics: [
        "ConstraintCritic",
        "CostCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PathAngleCritic",
        "PreferForwardCritic",
        "VelocityDeadbandCritic",
        "TwirlingCritic"
      ]

      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 60.0
        deadband_velocities: [0.08, 0.0, 0.10]

      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 6.0

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        critical_cost: 300.0
        consider_footprint: true     # FIX
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 0.5

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0           # FIX (was 14)
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 10   # FIX (was 20)
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      robot_radius: 0.20
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /zed/zed_node/point_cloud/cloud_registered
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          clearing: true
          marking: true
          data_type: "PointCloud2"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.20
      resolution: 0.05
      rolling_window: true
      width: 50
      height: 50
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 4.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /zed/zed_node/point_cloud/cloud_registered
          max_obstacle_height: 4.0
          min_obstacle_height: 0.1
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          clearing: true
          marking: true
          data_type: "PointCloud2"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.60   # FIX (was 0.015)
        cost_scaling_factor: 2.5

      always_send_full_costmap: true

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"  # KEEP / for Humble
      tolerance: 0.25
      allow_unknown: true

      max_iterations: 1000000     # FIX (was 1e9)
      max_planning_time: 2.0      # FIX (shorter is fine)
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      minimum_turning_radius: 0.4

      reverse_penalty: 5.0        # FIX
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      smooth_path: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 300
      do_refinement: true

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    velocity_timeout: 1.0

    max_velocity: [0.30, 0.0, 1.9]
    min_velocity: [-0.10, 0.0, -1.9]
    max_accel: [2.0, 0.0, 2.0]
    max_decel: [-2.0, 0.0, -2.0]

    deadband_velocity: [0.06, 0.0, 0.08]   # FIX (was 0)


